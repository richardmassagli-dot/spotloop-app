<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#0A1628" />
    <link rel="icon" type="image/svg+xml" href="/brand/spotloop-mark.svg" />
    <link rel="apple-touch-icon" href="/brand/spotloop-icon.svg" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="" />
    <meta name="description" content="Die moderne Stammgast-Wallet für lokale Lieblingsorte — Stempel sammeln, Rewards einlösen, Spots entdecken." />
    <title>Spotloop — Stammgast-Wallet</title>
    <script>
      (function () {
        function showBootError(msg) {
          var root = document.getElementById("root");
          if (!root) return;
          root.innerHTML =
            '<div style="min-height:100vh;padding:28px 22px;font-family:system-ui,-apple-system,sans-serif;background:#F7F9FF;color:#0A1628;box-sizing:border-box">' +
            '<p style="font-size:22px;font-weight:800;margin:0 0 8px">Spotloop</p>' +
            '<p style="font-size:14px;line-height:1.5;color:#64748B;margin:0 0 16px">' +
            (msg || "Die App konnte nicht starten.") +
            "</p>" +
            '<button type="button" onclick="location.reload()" style="width:100%;padding:14px;border:none;border-radius:12px;background:#1B4FD8;color:#fff;font-size:15px;font-weight:700">Neu laden</button>' +
            '<p style="font-size:12px;color:#94A3B8;margin:16px 0 0">Safari: Verlauf &amp; Websitedaten löschen, dann erneut öffnen.</p>' +
            "</div>";
        }
        window.__spotloopShowError = showBootError;
        window.addEventListener("error", function (e) {
          if (document.getElementById("spotloop-boot") && e.message) showBootError(e.message);
        });
        window.addEventListener("unhandledrejection", function (e) {
          if (!document.getElementById("spotloop-boot")) return;
          var r = e.reason;
          showBootError((r && r.message) || String(r || "Unbekannter Fehler"));
        });
        setTimeout(function () {
          if (document.getElementById("spotloop-boot")) {
            showBootError(
              "Die App startet nicht. Bitte die Seite neu laden oder im Safari-Verlauf die Website-Daten für spotloop.vercel.app löschen."
            );
          }
        }, 15000);
      })();
    </script>
  </head>
  <body style="margin:0;background:#F7F9FF">
    <div id="root">
      <div
        id="spotloop-boot"
        style="
          min-height:100vh;
          min-height:-webkit-fill-available;
          display:flex;
          flex-direction:column;
          align-items:center;
          justify-content:center;
          gap:12px;
          font-family:system-ui,-apple-system,sans-serif;
          color:#0A1628;
          background:#F7F9FF;
          padding:24px;
          box-sizing:border-box;
          text-align:center;
        "
      >
        <div style="display:inline-flex;align-items:center;justify-content:center;gap:0">
          <img src="/brand/spotloop-mark.svg" alt="" height="22" style="display:block;height:22px;width:auto" />
          <strong style="font-size:20px;font-weight:600;letter-spacing:-0.35px;margin:0 0 0 3px;color:#0A1628;line-height:1">spotloop</strong>
        </div>
        <span style="font-size:14px;color:#64748B">Wird geladen…</span>
      </div>
    </div>
    <style>
      @keyframes bootspin {
        to {
          transform: rotate(360deg);
        }
      }
      html {
        height: 100%;
        height: -webkit-fill-available;
      }
    </style>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
